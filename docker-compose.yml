services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/backend/data/familyspeak.sqlite
      - MEDIA_DIR=/app/backend/media
    env_file: .env
    volumes:
      - ./data/db:/app/backend/data
      - ./data/media:/app/backend/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    build:
      context: .
      dockerfile: infra/caddy/Dockerfile
    ports:
      - "443:443"
    env_file: .env
    volumes:
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped
